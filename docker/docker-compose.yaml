# =============================================================================
# Isaac Sim 5.1.0 — Docker Compose
# =============================================================================
# Usage:
#   cd docker
#   docker compose build
#   docker compose up -d
#   docker compose exec isaac-sim zsh
#
# First run pulls ~15 GB from nvcr.io (NGC login required).
# Subsequent runs use the host-side cache directories below.
# =============================================================================

name: ft-gaussian-dlo

services:
  isaac-sim:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
        HOST_USER: ${USER:-developer}
    image: ft-gaussian-dlo-isaac-sim:latest

    environment:
      # --- NVIDIA Omniverse EULA (required) ---
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
      # --- Runtime user ---
      - HOST_USER=${USER:-developer}
      # --- GPU ---
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # --- Display (X11 forwarding, set on host before compose up) ---
      - DISPLAY=${DISPLAY:-:1}

    volumes:
      # ---- Project workspace --------------------------------------------------
      - ..:/workspace:cached

      # ---- Isaac Sim persistent cache (survives container restarts) -----------
      # Paths inside container match NVIDIA's official documentation.
      - ${HOME}/.cache/isaac-sim/main:/isaac-sim/.cache:rw
      - ${HOME}/.cache/isaac-sim/compute:/isaac-sim/.nv/ComputeCache:rw
      - ${HOME}/.cache/isaac-sim/logs:/isaac-sim/.nvidia-omniverse/logs:rw
      - ${HOME}/.cache/isaac-sim/config:/isaac-sim/.nvidia-omniverse/config:rw
      - ${HOME}/.cache/isaac-sim/data:/isaac-sim/.local/share/ov/data:rw
      - ${HOME}/.cache/isaac-sim/pkg:/isaac-sim/.local/share/ov/pkg:rw

      # ---- Host git / SSH config (read-only) ----------------------------------
      - ${HOME}/.ssh:/home/${USER:-developer}/.ssh:ro
      - ${HOME}/.gitconfig:/home/${USER:-developer}/.gitconfig:ro

      # ---- Claude Code config (shared with host) ------------------------------
      - ${HOME}/.claude:/home/${USER:-developer}/.claude:cached

      # ---- X11 GUI forwarding (optional, for local display) -------------------
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

    # host network is required for WebRTC livestream (ports 47998 UDP, 49100 TCP)
    network_mode: host

    # GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    stdin_open: true
    tty: true
    working_dir: /workspace
    command: ["sleep", "infinity"]

  gic:
    build:
      context: .
      dockerfile: Dockerfile.gic
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
        HOST_USER: ${USER:-developer}
    image: ft-gaussian-dlo-gic:latest

    environment:
      - HOST_USER=${USER:-developer}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics,display
      - DISPLAY=${DISPLAY:-:1}
      - TORCH_CUDA_ARCH_LIST=8.6+PTX
      - OPEN3D_CPU_RENDERING=true

    volumes:
      # ---- Project workspace --------------------------------------------------
      - ..:/workspace:cached

      # ---- Host git / SSH config (read-only) ----------------------------------
      - ${HOME}/.ssh:/home/${USER:-developer}/.ssh:ro
      - ${HOME}/.gitconfig:/home/${USER:-developer}/.gitconfig:ro

      # ---- Claude Code config (shared with host) ------------------------------
      - ${HOME}/.claude:/home/${USER:-developer}/.claude:cached

      # ---- X11 GUI forwarding (Dear PyGui / Open3D viewer) --------------------
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

      # ---- Persistent pip / torch cache (survives rebuilds) ------------------
      - ${HOME}/.cache/gic/pip:/home/${USER:-developer}/.cache/pip:rw
      - ${HOME}/.cache/gic/torch:/home/${USER:-developer}/.cache/torch:rw

    network_mode: host

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    stdin_open: true
    tty: true
    working_dir: /workspace
    command: ["sleep", "infinity"]

    # profiles prevents `docker compose up -d` from starting gic alongside isaac-sim.
    # VS Code devcontainer targets the service by name, bypassing profile restriction.
    profiles: ["gic"]
